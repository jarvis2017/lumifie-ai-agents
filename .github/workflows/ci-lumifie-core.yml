name: lumifie-core
on:
  push:
    branches: [main]
    paths: ["lumifie-core/**", "lumifie-core/**", ".github/workflows/ci-lumifie-core.yml"]
  pull_request:
    branches: [main]
    paths: ["lumifie-core/**", "lumifie-core/**", ".github/workflows/ci-lumifie-core.yml"]
jobs:
  test:
    name: ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install
        run: |
          uv venv --python 3.12
          . .venv/bin/activate
          uv pip install -e "./lumifie-core[dev]"
      - name: Lint (ruff)
        run: |
          . .venv/bin/activate
          ruff check lumifie-core
      - name: Test (pytest)
        run: |
          . .venv/bin/activate
          cd lumifie-core && pytest
