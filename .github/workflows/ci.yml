name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create venv and install all packages
        run: |
          uv venv --python 3.12
          . .venv/bin/activate
          uv pip install -e ./lumifie-core
          uv pip install -e "./contract-intelligence-agent[dev]"
          uv pip install -e "./competitive-intel-agent[dev]"

      - name: Lint (ruff)
        run: |
          . .venv/bin/activate
          ruff check lumifie-core contract-intelligence-agent competitive-intel-agent

      - name: Test (pytest)
        run: |
          . .venv/bin/activate
          for pkg in lumifie-core contract-intelligence-agent competitive-intel-agent; do
            echo "::group::$pkg"
            (cd "$pkg" && pytest)
            echo "::endgroup::"
          done
